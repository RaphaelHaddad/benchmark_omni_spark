services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${VLLM_IMAGE:-qwen3-omni-vllm:latest}
    container_name: ${CONTAINER_NAME:-qwen3-omni-vllm}
    network_mode: host
    gpus: all
    volumes:
      - ${MODEL_PATH}:/models:ro
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
      - ${VLLM_CACHE_DIR:-${HOME}/.cache/vllm}:/root/.cache/vllm
      - ${LOG_DIR:-/tmp/vlm_logs}:/var/log/vllm:rw
      - ${VIDEO_DIR:-./videos}:/videos:ro
    environment:
      - VLLM_API_KEY=${VLLM_API_KEY:-your-api-key}
      - VLLM_HOST=${VLLM_HOST:-0.0.0.0}
      - VLLM_PORT=${VLLM_PORT:-8078}
      - MODEL_PATH=/models
      - SERVED_MODEL_NAME=${SERVED_MODEL_NAME:-qwen3-omni}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.90}
      - TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL_SIZE:-1}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    command:
      - bash
      - -lc
      - |
        exec python3 -m vllm.entrypoints.openai.api_server \
          --host "${VLLM_HOST:-0.0.0.0}" \
          --port "${VLLM_PORT:-8078}" \
          --model /models \
          --served-model-name "${SERVED_MODEL_NAME:-qwen3-omni}" \
          --api-key "${VLLM_API_KEY}" \
          --gpu-memory-utilization "${GPU_MEMORY_UTILIZATION:-0.85}" \
          --trust-remote-code \
          --disable-log-requests \
          --tensor-parallel-size "${TENSOR_PARALLEL_SIZE:-1}" \
          --max-model-len "${MAX_MODEL_LEN:-32768}" \
          --allowed-local-media-path / \
          --dtype auto \
          --no-enable-log-requests 2>&1 | tee /var/log/vllm/vllm.log || true
    env_file:
      - .env
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['all']
              capabilities: [gpu]
